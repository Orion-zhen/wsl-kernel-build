name: WSL2 Kernel Build

on:
  schedule:
    - cron: 0 0 * * 1

  workflow_dispatch:


jobs:
  ms-kernel-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main

      - name: Setup Build Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update -y
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev libncurses-dev dwarves git wget

      - name: System Overview
        run: |
          echo "已知CPU型号(降序): 7763, 8370C, 8272CL, 8171M, E5 系列"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量: $(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
          echo -e "CPU核心及版本信息: $(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息:"
          sudo lshw -short -C memory | grep GiB
          echo -e "\n"
          echo "--------------------------硬盘信息--------------------------"
          echo -e  "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
          echo "硬盘详情:"
          df -Th

      - name: Fetch Linux
        uses: actions/checkout@v6
        with:
          repository: microsoft/WSL2-Linux-Kernel
          path: .
          submodules: true

      # - name: Fetch WSL Config
      #   run: |
      #     wget -O .config https://github.com/microsoft/WSL2-Linux-Kernel/raw/linux-msft-wsl-6.6.y/arch/x86/configs/config-wsl

      - name: Prepare Privileged Loop/Mount Environment
        run: |
          set -euxo pipefail

          # GitHub-hosted Ubuntu runner 应该支持 passwordless sudo
          sudo -n true

          # 准备 loop device
          sudo modprobe loop || true

          # 有些 runner 镜像里 loop 节点可能没有预创建，手动补齐
          if [ ! -e /dev/loop-control ]; then
            sudo mknod /dev/loop-control c 10 237
          fi

          for i in $(seq 0 63); do
            if [ ! -e "/dev/loop$i" ]; then
              sudo mknod "/dev/loop$i" b 7 "$i"
            fi
          done

          sudo chmod 660 /dev/loop-control /dev/loop* || true
          sudo chown root:disk /dev/loop-control /dev/loop* || true

          # 验证 losetup 可用
          sudo losetup -f
          sudo losetup -a || true

      - name: Organize Configs
        run: |
          # 默认配置项
          cp Microsoft/config-wsl .config
          # 修改内核后缀
          scripts/config --set-str LOCALVERSION "-Orion-WSL2"
          scripts/config --disable LOCALVERSION_AUTO

          make olddefconfig

      - name: Build
        run: |
          make -j$(nproc)
          # make INSTALL_MOD_PATH="$PWD/modules" modules_install

          # sudo bash ./Microsoft/scripts/gen_modules_vhdx.sh "$PWD/modules" $(make -s kernelrelease) modules.vhdx

      - name: Delete Stale Release
        run: |
          gh release delete wsl-kernel --cleanup-tag --yes
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: wsl-kernel
          name: "WSL Kernel"
          body: |
            x86_64 架构, 适用于 WSL2 的内核映像.
          draft: false
          prerelease: false
          files: |
            ${{ github.workspace }}/arch/x86_64/boot/bzImage
            # ${{ github.workspace }}/modules.vhdx
